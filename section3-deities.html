<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>Section 3 — Deity Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --parchment: #f0e8d5;
      --parchment-card: #ede0c4;
      --charcoal: #1a1713;
      --charcoal-mid: #2c2218;
      --gold: #c4892a;
      --gold-border: #7a5c1e;
      --text1: #1a1713;
      --text2: rgba(26,23,19,0.7);
    }
    html, body {
      width: 1440px;
      height: 760px;
      overflow: hidden;
      background: var(--parchment);
    }
    .section {
      width: 1440px;
      height: 760px;
      background: var(--parchment);
      padding: 46px 80px 40px;
      position: relative;
      overflow: hidden;
    }
    .section::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(44,34,24,0.09) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
      position: relative;
      z-index: 2;
    }
    .micro-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.45em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .section-title {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 34px;
      font-weight: 600;
      color: var(--text1);
      letter-spacing: 0.12em;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .divider-ornament {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.3em;
    }
    .deity-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 10px;
      position: relative;
      z-index: 2;
      height: 574px;
    }
    .deity-card {
      background: var(--parchment-card);
      border: 1px solid var(--charcoal-mid);
      border-radius: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .deity-card.highlighted {
      border: 2px solid var(--gold);
    }
    .deity-card.highlighted::after {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(196,137,42,0.25);
      pointer-events: none;
      z-index: 10;
    }
    .deity-portrait {
      flex: 0 0 56%;
      overflow: hidden;
      border-bottom: 1px solid rgba(44,34,24,0.2);
      position: relative;
    }
    .deity-card.highlighted .deity-portrait {
      background: radial-gradient(ellipse at center, rgba(196,137,42,0.07) 0%, transparent 70%);
    }
    .deity-portrait svg {
      width: 100%;
      height: 100%;
    }
    .deity-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      gap: 3px;
    }
    .deity-name-en {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .deity-name-zh {
      font-family: 'Noto Serif SC', serif;
      font-size: 10px;
      color: var(--text2);
      letter-spacing: 0.08em;
    }
    .bottom-cta {
      text-align: center;
      margin-top: 14px;
      position: relative;
      z-index: 2;
    }
    .bottom-cta a {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.3em;
      text-decoration: underline;
      text-decoration-color: rgba(196,137,42,0.5);
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
<div class="section">
  <div class="header">
    <div class="micro-label">Deity Archetypes</div>
    <div class="section-title">八位神祇，等待被召唤</div>
    <div class="divider-ornament">✦</div>
  </div>
  <div class="deity-grid">
    <!-- 1: Zeus -->
    <div class="deity-card">

          <line x1="111" y1="65" x2="107" y2="54" stroke="#c4892a" stroke-width="0.7" opacity="0.5"/>
          <line x1="120" y1="63" x2="120" y2="52" stroke="#c4892a" stroke-width="0.7" opacity="0.5"/>
          <line x1="129" y1="65" x2="133" y2="54" stroke="#c4892a" stroke-width="0.7" opacity="0.5"/>
          <line x1="135" y1="68" x2="140" y2="58" stroke="#c4892a" stroke-width="0.7" opacity="0.5"/>
          <text x="10" y="22" font-size="7" fill="#c4892a" opacity="0.4" font-family="serif">⚡</text>
          <text x="215" y="130" font-size="6" fill="#c4892a" opacity="0.3" font-family="serif">✦</text>
        </svg>
      </div>
      <div class="deity-info">
        <div class="deity-name-en">Zeus</div>
        <div class="deity-name-zh">宙斯 · 雷霆之神</div>
      </div>
    </div>
    <!-- 2: Athena — HIGHLIGHTED -->
    <div class="deity-card highlighted">
      <div class="deity-portrait">
        <svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <rect width="240" height="140" fill="rgba(237,224,196,0.65)"/>
          <line x1="20" y1="0" x2="240" y2="140" stroke="#2c2218" stroke-width="0.4" opacity="0.06"/>

          <text x="214" y="18" font-size="6" fill="#c4892a" opacity="0.5" font-family="serif">✦</text>
        </svg>
      </div>
      <div class="deity-info">
        <div class="deity-name-en">Athena</div>
        <div class="deity-name-zh">雅典娜 · 智慧女神</div>

    </div>
    <!-- 3: Apollo -->
    <div class="deity-card">

          <line x1="96" y1="31" x2="89" y2="24" stroke="#c4892a" stroke-width="0.7" opacity="0.45"/>

          <line x1="96" y1="79" x2="89" y2="86" stroke="#c4892a" stroke-width="0.7" opacity="0.45"/>
          <line x1="144" y1="79" x2="151" y2="86" stroke="#c4892a" stroke-width="0.7" opacity="0.45"/>

        </svg>
      </div>
      <div class="deity-info">
        <div class="deity-name-en">Apollo</div>
        <div class="deity-name-zh">阿波罗 · 太阳之神</div>
      </div>
    </div>
    <!-- 4: Artemis -->
    <div class="deity-card">
      <div class="deity-portrait">
        <svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <rect width="240" height="140" fill="rgba(237,224,196,0.6)"/>

      <div class="deity-info">

        <div class="deity-name-zh">阿尔忒弥斯 · 月之女神</div>
      </div>
    </div>
    <!-- 5: Hermes -->

          <path d="M120 11 Q131 4 147 9 Q152 15 144 18 Q133 15 120 19" fill="none" stroke="#c4892a" stroke-width="0.9" opacity="0.65"/>

      <div class="deity-info">

    <!-- 8: Hades -->
    <div class="deity-card">
      <div class="deity-portrait">
        <svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <rect width="240" height="140" fill="rgba(222,210,190,0.55)"/>
          <line x1="20" y1="0" x2="240" y2="140" stroke="#2c2218" stroke-width="0.5" opacity="0.1"/>
          <line x1="0" y1="0" x2="220" y2="140" stroke="#2c2218" stroke-width="0.5" opacity="0.1"/>
