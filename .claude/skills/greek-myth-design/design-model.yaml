name: "greek-myth-design"
philosophy: "千年羊皮纸遇见现代极简。古典排版骨骼承载神秘内容，仪式感的繁复与阅读的克制之间保持精确张力。每个页面都像从神庙地下室挖出的古老手册——有岁月质感，有手写温度，有符文神秘，但内容清晰可读。"
primary_mode: "light"
brand_domain: "Greek mythology personality test / interactive editorial"
brand_type: "content-rich"
mono_for_code: false
mono_for_metrics: false

primitives:
  colors:
    neutral:
      50: "#FAF6EE"
      100: "#F5F0E8"
      150: "#EDE6D6"
      200: "#E0D5BF"
      300: "#C4A882"
      400: "#A89880"
      500: "#8B6E4E"
      600: "#6B5744"
      700: "#4A3828"
      800: "#3A2818"
      900: "#2C1F0E"
      950: "#1A1008"
    brand:
      50: "#FDF8EC"
      100: "#FAF0D0"
      200: "#F0D88A"
      300: "#D4A843"
      400: "#C49020"
      500: "#B8860B"
      600: "#9A6F08"
      700: "#7A5C1E"
      800: "#5C4216"
      900: "#3D2C0A"
      950: "#1E1505"
    red:
      50: "#F9EDED"
      500: "#8B3A3A"
      900: "#4A1A1A"
    green:
      50: "#EFF4EB"
      500: "#5C7A4E"
      900: "#2A3C22"
    amber:
      50: "#FDF8EC"
      500: "#B8860B"
      900: "#3D2C0A"

  spacing: [0, 4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80]
  radii: [0, 2, 4]

tokens:
  colors:
    light:
      background: "{neutral.100}"
      surface1: "{neutral.150}"
      surface2: "{neutral.200}"
      surface3: "{neutral.300}"
      border: "{neutral.300}"
      border_visible: "{neutral.500}"
      text1: "{neutral.900}"
      text2: "{neutral.600}"
      text3: "{neutral.500}"
      text4: "{neutral.400}"
      accent: "{brand.500}"
      accent_subtle: "{brand.50}"
    dark:
      background: "{neutral.950}"
      surface1: "{neutral.900}"
      surface2: "{neutral.800}"
      surface3: "{neutral.700}"
      border: "{neutral.700}"
      border_visible: "{neutral.600}"
      text1: "{neutral.50}"
      text2: "{neutral.300}"
      text3: "{neutral.400}"
      text4: "{neutral.500}"
      accent: "{brand.300}"
      accent_subtle: "{brand.950}"
    success: "{green.500}"
    warning: "{amber.500}"
    error: "{red.500}"

  spacing:
    2xs: 4
    xs: 8
    sm: 12
    md: 16
    lg: 24
    xl: 32
    2xl: 48
    3xl: 64
    4xl: 80

  radii:
    element: 0
    control: 0
    component: 0
    container: 2
    pill: 2

  typography:
    display: { family: "Cinzel Decorative", size: "36px", weight: 700, line_height: 1.2, letter_spacing: "0.15em" }
    heading: { family: "Cinzel", size: "20px", weight: 600, line_height: 1.3, letter_spacing: "0.2em" }
    subheading: { family: "Cinzel", size: "14px", weight: 400, line_height: 1.4, letter_spacing: "0.2em" }
    body: { family: "Noto Serif SC", size: "14px", weight: 400, line_height: 2.0 }
    body_sm: { family: "Noto Serif SC", size: "12px", weight: 400, line_height: 1.75 }
    caption: { family: "Cinzel", size: "10px", weight: 400, line_height: 1.4, letter_spacing: "0.2em" }
    label: { family: "Cinzel", size: "10px", weight: 400, line_height: 1.4, letter_spacing: "0.15em" }
    mono: { family: "Courier New", size: "12px", weight: 400 }

  elevation:
    strategy: "flat"
    note: "无阴影。层次通过描边深浅和背景色差异表达。border 用 #C4A882，border_visible 用 #8B6E4E。"

  motion:
    personality: "ritual"
    easing: "cubic-bezier(0.22, 1, 0.36, 1)"
    duration_fast: "200ms"
    duration_normal: "350ms"
    duration_emphasis: "500ms"
    note: "克制为主。重要时刻（进入结果页）允许更隆重的淡入动效。禁止 scale 放大、弹性弹跳、发光效果。"

  hero_stage:
    preset: "flat-blank"
    observed_style:
      description: "奶油米黄底色页面，无背景图形场。装饰来自月相符文图案（SVG 圆形徽章）、手绘感边框、角花，以及顶部金色装饰线。整体是一本摊开的古典手册，不是有背景的营销页面。"
      where_used: ["hero", "all screens"]
    background:
      medium: "absent"
      color_mode: "brand-tinted-neutral"
      saturation: "muted"
      light_source: "ambient"
      falloff: "soft"
      vignette: "off"
      texture: "paper"
      motion: "static"
      intensity: "subtle"
      safe_zone: "full-bleed"
      color_palette: ["#F5F0E8", "#EDE6D6", "#C4A882", "#B8860B", "#2C1F0E"]
    hero:
      subject: "composition"
      placement: "center"
      scale: "accent"
      tint: "neutral"
    relation:
      type: "flat"
      bleed: 0
    disclaimer: "Hero 区域使用月相符文 SVG 徽章组合作为 composition 装饰元素，非外部图片资源，完全 CSS/SVG 实现。"

  iconography:
    observed_style:
      description: "Unicode 符号体系替代图标库：✦ ✧ ◆ ◇ ☽ ☾ ● ⊱ ⊰ ✠ 等。手写感、符文感，不是标准线框图标。约 1-2px 视觉粗细，有机形态，与正文字体气质一致。"
      stroke_weight: "thin to regular"
      corner_treatment: "organic"
      fill_style: "mixed (outline + solid Unicode)"
      form_language: "hand-drawn"
      visual_density: "minimal"
    fallback_kit:
      name: "Phosphor"
      weight: "thin"
      match_score: "medium"
      match_reasoning: "本设计主要使用 Unicode 符号而非标准图标库。当确实需要标准图标时，Phosphor thin 是最接近的选择——细描边、人文感、不过分工业化。Iconoir 是第二选择，但 Unicode 符号在古典感上更优先。"
      cdn: "https://unpkg.com/@phosphor-icons/web@2/src/thin/style.css"
      icon_class_prefix: "ph-thin ph-"
    disclaimer: "本设计语言主要使用 Unicode 符号（✦ ◆ ☽ ⊱ 等）作为装饰系统，优先于任何图标库。Phosphor thin 仅作为需要标准 UI 图标时的备选。"

components:
  button_primary:
    source: "derived"
    background: "transparent"
    color: "{brand.500}"
    border: "1px solid {brand.700}"
    padding: "14px 40px"
    radius: "{radii.control}"
    font_family: "Cinzel"
    font_size: "14px"
    font_weight: 400
    letter_spacing: "0.2em"
    hover:
      background: "rgba(184,134,11,0.08)"
      color: "{brand.300}"
    decoration: "::before + ::after 角落 ✦ 符号，hover 时显现"
    justification: "参考 Witch Test 图的极简手册风格：线框感、无填充、字间距宽、只在 hover 时出现装饰符号"

  button_secondary:
    source: "derived"
    background: "transparent"
    border: "none"
    border_bottom: "1px solid {neutral.300}"
    color: "{neutral.400}"
    padding: "8px 0"
    font_family: "Cinzel"
    font_size: "12px"
    letter_spacing: "0.15em"
    hover:
      color: "{neutral.900}"
      border_color: "{brand.700}"

  card_info:
    source: "observed"
    background: "{neutral.100}"
    border: "1px solid {neutral.300}"
    padding: "20px 24px"
    radius: 0
    note: "直角线框，无阴影。参考图1信息分区框。"

  card_section:
    source: "observed"
    background: "{neutral.150}"
    border: "1px solid {neutral.500}"
    padding: "20px 24px"
    radius: 0
    title_font: "Cinzel"
    title_size: "12px"
    title_color: "{brand.500}"
    title_letter_spacing: "0.2em"
    title_border_bottom: "1px solid {neutral.300}"
    title_padding_bottom: "8px"
    title_margin_bottom: "16px"
    note: "带标题的章节卡，参考图1「她是谁」样式"

  input_field:
    source: "derived"
    background: "transparent"
    border: "none"
    border_bottom: "1px solid {neutral.500}"
    padding: "10px 0"
    font_family: "Noto Serif SC"
    font_size: "16px"
    color: "{neutral.900}"
    placeholder_color: "{neutral.400}"
    focus_border: "{brand.500}"
    radius: 0
    justification: "参考 Witch Test 极简线条风格：下划线输入框，无填充，无圆角"

  option_button:
    source: "derived"
    background: "transparent"
    border: "1px solid {neutral.300}"
    padding: "14px 20px 14px 36px"
    font_family: "Noto Serif SC"
    font_size: "14px"
    line_height: 1.7
    color: "{neutral.900}"
    radius: 0
    hover:
      border_color: "{brand.700}"
      background: "rgba(184,134,11,0.05)"
      color: "{brand.500}"
    selected:
      border_color: "{brand.500}"
      background: "rgba(184,134,11,0.08)"
      color: "{brand.500}"
    justification: "测试题选项，参考图1信息格子风格，左侧有序号圆点 ::before"

  progress_bar:
    source: "derived"
    height: "1px"
    track_color: "{neutral.300}"
    fill_color: "{brand.500}"
    radius: 0
    dot_size: "6px"
    dot_color: "{brand.500}"
    note: "极细线性进度条，终点有小圆点，参考 Witch Test 极简风"

  stat_row:
    source: "derived"
    grid: "60px 1fr 36px"
    gap: "12px"
    track_height: "1px"
    bar_color: "{brand.700}"
    dot_color: "{brand.500}"
    label_font: "Cinzel"
    label_size: "10px"
    value_color: "{brand.500}"
    note: "6维人格数据条，参考图1数据呈现，极细线"

  tag:
    source: "observed"
    background: "transparent"
    border: "1px solid {brand.700}"
    color: "{brand.500}"
    padding: "4px 12px"
    font_size: "10px"
    letter_spacing: "0.15em"
    font_family: "Cinzel"
    radius: 0
    filled_variant:
      background: "{brand.700}"
      color: "{neutral.100}"

  divider:
    source: "observed"
    type: "ornamental"
    variants:
      - "────────── ✦ ──────────"
      - "⊱ ────────── ⊰"
      - "· · · ◆ · · ·"
      - "─────── ☽ ───────"
    color: "{brand.700}"
    gradient: "linear-gradient(90deg, transparent, {border.visible}, transparent)"

app_screen:
  archetype: "list-detail"
  frame: "phone"
  frame_params:
    title: "神话人格测试"
  content_seed: "用户正在回答关于赫拉的测试题，已完成第3题共10题"
  required_tokens_checklist:
    - "background, surface1, surface2, surface3, border, border_visible"
    - "text1, text2, text3, text4"
    - "accent, accent_subtle, success, warning, error"
    - "all typography scale tokens"
    - "all spacing tokens used in components"
