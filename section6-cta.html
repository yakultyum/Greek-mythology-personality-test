<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1440">
  <title>Section 6 — CTA + Footer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --charcoal: #1a1713;
      --parchment: #f0e8d5;
      --gold: #c4892a;
      --gold-solid: #c4892a;
    }
    html, body {
      width: 1440px;
      height: 720px;
      overflow: hidden;
      background: var(--charcoal);
    }
    .section {
      width: 1440px;
      height: 720px;
      background: var(--charcoal);
      position: relative;
      overflow: hidden;
    }
    /* Star constellation SVG background */
    .constellation-bg {
      position: absolute;
      top: 0;
      right: 0;
      width: 700px;
      height: 600px;
      z-index: 1;
    }
    /* Content zone — bottom left anchor */
    .content-zone {
      position: absolute;
      bottom: 90px;
      left: 100px;
      z-index: 10;
      max-width: 560px;
    }
    .moon-phases-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    .moon-phases-row span {
      font-size: 11px;
      color: var(--gold);
      opacity: 0.75;
    }
    .micro-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.45em;
      color: rgba(196,137,42,0.6);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .thin-rule {
      width: 120px;
      height: 1px;
      background: rgba(196,137,42,0.45);
      margin-bottom: 22px;
    }
    .main-headline {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 50px;
      font-weight: 400;
      color: var(--parchment);
      letter-spacing: 0.08em;
      line-height: 1.25;
      margin-bottom: 18px;
    }
    .main-headline .line2 {
      font-size: 42px;
    }
    .support-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      color: rgba(240,232,213,0.65);
      letter-spacing: 0.08em;
      line-height: 1.8;
      margin-bottom: 28px;
    }
    /* Primary CTA — solid amber fill, rectangular */
    .cta-primary {
      display: inline-block;
      background: var(--gold-solid);
      color: var(--charcoal);
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.4em;
      padding: 16px 52px;
      border: none;
      cursor: pointer;
      border-radius: 0;
      margin-bottom: 14px;
    }
    .cta-note {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      color: rgba(240,232,213,0.32);
      letter-spacing: 0.2em;
    }
    /* Footer strip */
    .footer-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      border-top: 1px solid rgba(196,137,42,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 100px;
      z-index: 10;
    }
    .footer-left {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      color: rgba(196,137,42,0.55);
      letter-spacing: 0.3em;
    }
    .footer-center {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      color: rgba(240,232,213,0.38);
      letter-spacing: 0.15em;
    }
    .footer-right {
      font-size: 14px;
      color: rgba(196,137,42,0.55);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
<div class="section">
  <!-- Constellation + Moon medallion — upper right -->
  <svg class="constellation-bg" viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Star dots -->
    <circle cx="580" cy="80" r="2" fill="#c4892a" opacity="0.35"/>
    <circle cx="520" cy="140" r="1.5" fill="#c4892a" opacity="0.3"/>
    <circle cx="610" cy="180" r="2" fill="#c4892a" opacity="0.28"/>
    <circle cx="480" cy="230" r="1.5" fill="#c4892a" opacity="0.35"/>
    <circle cx="560" cy="270" r="2" fill="#c4892a" opacity="0.3"/>
    <circle cx="630" cy="240" r="1.5" fill="#c4892a" opacity="0.28"/>
    <circle cx="500" cy="310" r="2" fill="#c4892a" opacity="0.32"/>
    <circle cx="590" cy="340" r="1.5" fill="#c4892a" opacity="0.25"/>
    <circle cx="450" cy="370" r="2" fill="#c4892a" opacity="0.3"/>
    <circle cx="540" cy="400" r="1.5" fill="#c4892a" opacity="0.28"/>
    <circle cx="620" cy="390" r="2" fill="#c4892a" opacity="0.22"/>
    <circle cx="470" cy="450" r="1.5" fill="#c4892a" opacity="0.25"/>
    <circle cx="550" cy="480" r="1.5" fill="#c4892a" opacity="0.2"/>
    <circle cx="400" cy="290" r="2" fill="#c4892a" opacity="0.32"/>
    <circle cx="360" cy="350" r="1.5" fill="#c4892a" opacity="0.25"/>
    <circle cx="420" cy="420" r="1.5" fill="#c4892a" opacity="0.22"/>
    <!-- Extra smaller stars -->
    <circle cx="660" cy="120" r="1" fill="#c4892a" opacity="0.22"/>
    <circle cx="340" cy="420" r="1" fill="#c4892a" opacity="0.18"/>
    <circle cx="680" cy="310" r="1" fill="#c4892a" opacity="0.2"/>
    <!-- Constellation lines -->
    <line x1="580" y1="80" x2="520" y2="140" stroke="#c4892a" stroke-width="0.5" opacity="0.18"/>
    <line x1="520" y1="140" x2="610" y2="180" stroke="#c4892a" stroke-width="0.5" opacity="0.18"/>
    <line x1="610" y1="180" x2="560" y2="270" stroke="#c4892a" stroke-width="0.5" opacity="0.15"/>
    <line x1="480" y1="230" x2="560" y2="270" stroke="#c4892a" stroke-width="0.5" opacity="0.15"/>
    <line x1="560" y1="270" x2="630" y2="240" stroke="#c4892a" stroke-width="0.5" opacity="0.15"/>
    <line x1="480" y1="230" x2="500" y2="310" stroke="#c4892a" stroke-width="0.5" opacity="0.15"/>
    <line x1="500" y1="310" x2="590" y2="340" stroke="#c4892a" stroke-width="0.5" opacity="0.13"/>
    <line x1="500" y1="310" x2="450" y2="370" stroke="#c4892a" stroke-width="0.5" opacity="0.13"/>
    <line x1="450" y1="370" x2="540" y2="400" stroke="#c4892a" stroke-width="0.5" opacity="0.12"/>
    <line x1="400" y1="290" x2="450" y2="370" stroke="#c4892a" stroke-width="0.5" opacity="0.13"/>
    <line x1="400" y1="290" x2="360" y2="350" stroke="#c4892a" stroke-width="0.5" opacity="0.13"/>
    <line x1="360" y1="350" x2="420" y2="420" stroke="#c4892a" stroke-width="0.5" opacity="0.12"/>
    <!-- Large moon medallion -->
    <!-- Outer glow ring -->
    <circle cx="565" cy="200" r="165" fill="none" stroke="#c4892a" stroke-width="0.3" opacity="0.08"/>
    <!-- Main moon circle -->
    <circle cx="565" cy="200" r="148" fill="none" stroke="#c4892a" stroke-width="0.9" opacity="0.25"/>
    <!-- Moon surface lines (craters/mare) -->
    <circle cx="565" cy="200" r="140" fill="rgba(196,137,42,0.03)" stroke="none"/>
    <!-- Greek meander ring border — barely visible -->
    <circle cx="565" cy="200" r="155" fill="none" stroke="#c4892a" stroke-width="0.5" opacity="0.12"
            stroke-dasharray="8 4 2 4 8 4 2 4"/>
    <!-- Moon face fine-line engraving -->
    <circle cx="565" cy="200" r="130" fill="none" stroke="#c4892a" stroke-width="0.5" opacity="0.15"/>
    <!-- Moon phase crescent suggestion -->
    <path d="M565 70 Q480 100 480 200 Q480 300 565 330 Q520 300 520 200 Q520 100 565 70Z"
          fill="rgba(196,137,42,0.04)" stroke="#c4892a" stroke-width="0.5" opacity="0.15"/>
    <!-- Decorative inner ring with meander pattern hint -->
    <circle cx="565" cy="200" r="118" fill="none" stroke="#c4892a" stroke-width="0.4" opacity="0.12"/>
    <!-- Inner moon cross -->
    <line x1="565" y1="72" x2="565" y2="328" stroke="#c4892a" stroke-width="0.3" opacity="0.08"/>
    <line x1="420" y1="200" x2="710" y2="200" stroke="#c4892a" stroke-width="0.3" opacity="0.08"/>
    <!-- Star marks on moon -->
    <text x="528" y="165" font-size="8" fill="#c4892a" opacity="0.25" font-family="serif">✦</text>
    <text x="590" y="230" font-size="7" fill="#c4892a" opacity="0.22" font-family="serif">✦</text>
    <text x="548" y="245" font-size="6" fill="#c4892a" opacity="0.2" font-family="serif">✦</text>
    <!-- Faint hatch on moon -->
    <line x1="430" y1="120" x2="700" y2="280" stroke="#c4892a" stroke-width="0.3" opacity="0.05"/>
    <line x1="415" y1="145" x2="685" y2="295" stroke="#c4892a" stroke-width="0.3" opacity="0.05"/>
    <line x1="430" y1="95" x2="700" y2="255" stroke="#c4892a" stroke-width="0.3" opacity="0.05"/>
  </svg>

  <!-- Text content zone — bottom left -->
  <div class="content-zone">
    <div class="moon-phases-row">
      <span>●</span>
      <span>◐</span>
      <span style="font-size:13px;">○</span>
      <span>◑</span>
      <span>●</span>
    </div>
    <div class="micro-label">Begin Your Journey</div>
    <div class="thin-rule"></div>
    <div class="main-headline">
      命运从不随机<br>
      <span class="line2">神话早已为你写好答案</span>
    </div>
    <div class="support-text">加入 23,847 人参与的神话人格探索</div>
    <div>
      <button class="cta-primary">开 始 神 谕 测 试</button>
    </div>
    <div class="cta-note">约需 3 分钟 · 完全免费 · 无需注册</div>
  </div>

  <!-- Footer strip -->
  <div class="footer-strip">
    <div class="footer-left">MYTH · TEST © MMXXVI</div>
    <div class="footer-center">关于测试 · 隐私政策 · 分享结果</div>
    <div class="footer-right">☽○☾</div>
  </div>
</div>
</body>
</html>
